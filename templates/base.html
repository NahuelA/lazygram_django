{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Css sheets -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

    <!-- To links -->
    {% block others_styles %}
    {% endblock %}

    <!-- Titles -->
    {% block title %}
        <title>Home | Copygram</title>
    {% endblock %}
</head>
<body>

    {% block header %}
    <header class="container-header">
            <nav class="menu">
                <div class="logo">
                    <a href="{% url 'home' %}">
                        <img src="{% static 'imgs/logo_instagram.png' %}" alt="copygram_logo">
                        <h1>Copygram</h1>
                    </a>
                </div>
                <ul class="items-menu-ul">
                    <a href="{% url 'home' %}" class="linkf-menu"><li class="itemf-menu"><img src="{% static 'imgs/house-solid.svg' %}" alt=""></li></a>
                    <a href="{% url 'profile' %}" class="linkf-menu"><li class="itemf-menu"><img src="{% static 'imgs/user-solid.svg' %}" alt=""></li></a>
                    <a href="#" class="linkf-menu"><li class="itemf-menu"><img src="{% static 'imgs/inbox-solid.svg' %}" alt=""></li></a>
                    <a href="{% url 'logout' %}" class="linkf-menu"><li class="itemf-menu"><img src="{% static 'imgs/right-from-bracket-solid.svg' %}" alt=""></li></a>
                    <!-- <a href="#" class="linkf-menu"><li class="itemf-menu "><img src="{% static 'imgs/right-from-bracket-solid.svg' %}" alt=""></li></a> -->
                </ul>
            </nav>
    </header>
    {% endblock %}

    <!-- All sections -->
    {% block container_main %}
    {% endblock %}

    <!-- Scripts -->
    {% block scripts %}
    {% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
